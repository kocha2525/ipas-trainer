<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>かわいい単語トレーナー</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- タイトル画面 -->
    <div id="titleScreen" class="screen active fade">
      <h1 class="title">かわいい単語トレーナー</h1>
      <p class="subtitle">グループを選んで学習できるよ</p>
      <button id="startBtn" class="btn big primary">はじめる</button>
    </div>

    <!-- グループ選択画面 -->
    <div id="groupScreen" class="screen">
      <h2 class="section-title">学習するグループを選んでね(複数選択可能)</h2>

      <div class="group-list">
        <button class="group-btn" data-group="1">グループ 1</button>
        <button class="group-btn" data-group="2">グループ 2</button>
      </div>

      <button id="groupWordListBtn" class="btn small">単語リスト</button>
      <button id="groupStartBtn" class="btn primary" style="margin-top: 30px">
        スタート
      </button>
    </div>

    <!-- 学習画面 -->
    <div id="mainScreen" class="screen">
      <div class="top-bar">
        <h2 class="app-name">学習中</h2>
        <div class="score" id="score">正解数：0</div>
      </div>

      <button id="historyBtn" class="btn small">正誤履歴</button>

      <div class="progress-bar">
        <div id="progressFill"></div>
      </div>

      <div id="quizArea" class="quiz-area"></div>
    </div>

    <!-- モード選択 -->
    <div id="modeScreen" class="screen">
      <h2>モードを選択</h2>
      <button class="mode-btn" data-mode="typing">タイピング</button>
      <button class="mode-btn" data-mode="choice">四択</button>
      <button class="mode-btn" data-mode="review">復習</button>
    </div>

    <!-- 履歴ページ -->
    <div id="historyScreen" class="screen">
      <h2 class="section-title">正誤履歴</h2>
      <div id="historyList" class="word-list"></div>
      <button id="historyBackBtn" class="btn small">戻る</button>
    </div>

    <!-- 単語一覧ページ -->
    <div id="listScreen" class="screen">
      <h2 class="section-title">単語一覧</h2>
      <div id="wordList" class="word-list"></div>
      <button id="backBtn" class="btn small">戻る</button>
    </div>

    <!-- ★★★ script.js は最後に読み込む ★★★ -->
    <script src="script.js"></script>
  </body>
</html>
